<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Portal - Login</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="top-nav">
        <ul class="nav-left">
            <li><a href="#">Registrations</a></li>
            <li><a href="#">Bursaries</a></li>
            <li><a href="#">Events</a></li>
            <li><a href="#">Research</a></li>
            <li><a href="#">Faculties</a></li>
            <li><a href="#">SOS</a></li>
            <li><a href="#">Shuttles</a></li>
            <li><a href="#">Residences</a></li>
            <li><a href="#">Sports</a></li>
        </ul>
        <div class="nav-logo">
            <img src="logo.jpg" alt="University Logo">
        </div>
    </nav>

    <!-- HERO SECTION -->
    <section class="hero-section">

        <div class="login-container">
            <div class="login-logo">
                <img src="logo.jpg" alt="University Logo">
            </div>

            <form id="loginForm">

                <div class="input-group">
                    <input type="text" id="username" required>
                    <label for="username">Username</label>
                </div>

                <div class="input-group">
                    <input type="password" id="password" required>
                    <label for="password">Password</label>
                </div>

                <div class="options">
                    <label>
                        <input type="checkbox" id="rememberMe"> Remember Me
                    </label>
                    <button type="button" id="togglePassword">Show</button>
                </div>

                <button type="submit" class="btn btn-primary">Sign In</button>
                <a href="signUP.html" class="btn btn-secondary">Sign Up</a>

                <p class="error-message" id="errorMessage"></p>

            </form>
        </div>

    </section>

    <script src="home.js"></script>
</body>
</html>
